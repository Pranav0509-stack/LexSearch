<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judgment Viewer — LexSearch</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="viewer-page">

  <!-- ── Viewer Toolbar ── -->
  <div class="viewer-toolbar">
    <a href="javascript:history.back()" class="back-btn">← Back to Results</a>

    <span class="case-title" id="case-title">Loading judgment…</span>

    <div class="toolbar-actions">
      <!-- Page controls -->
      <div class="page-controls">
        <button id="prev-page" title="Previous page" disabled>‹</button>
        <span id="page-info">— / —</span>
        <button id="next-page" title="Next page" disabled>›</button>
      </div>

      <!-- Zoom -->
      <div class="page-controls">
        <button id="zoom-out" title="Zoom out">−</button>
        <span id="zoom-label">100%</span>
        <button id="zoom-in"  title="Zoom in">+</button>
      </div>

      <!-- AI Summarize -->
      <button id="ai-summarize-btn" class="btn btn-summarize" style="font-size:0.8rem;padding:0.4rem 0.85rem">
        AI Summary
      </button>

      <!-- Download -->
      <a id="download-btn" class="btn btn-download" href="#" download style="font-size:0.8rem;padding:0.4rem 0.85rem">
        ⬇ Download PDF
      </a>
    </div>
  </div>

  <!-- ── AI Panel ── -->
  <div id="ai-panel" class="ai-panel" style="display:none">
    <div class="ai-panel-header">
      <h3>AI Analysis</h3>
      <button id="ai-panel-close" class="ai-panel-close">&times;</button>
    </div>
    <div id="ai-panel-content" class="ai-panel-body">
      <div class="summary-loading">Analyzing judgment with AI...</div>
    </div>
    <div class="ai-panel-qa">
      <h4>Ask about this case</h4>
      <div class="qa-input-row">
        <input type="text" id="viewer-qa-input" class="qa-input" placeholder="e.g. What was the penalty?" />
        <button id="viewer-qa-btn" class="btn btn-read qa-btn">Ask</button>
      </div>
      <div id="viewer-qa-answer" class="qa-answer" style="display:none"></div>
    </div>
  </div>

  <!-- ── PDF Canvas ── -->
  <div id="pdf-canvas-container">
    <div id="loading-msg" class="viewer-loading">
      <div class="spinner" style="border-color:rgba(255,255,255,0.2);border-top-color:var(--gold)"></div>
      <div>Loading PDF…</div>
    </div>
    <canvas id="pdf-canvas" style="display:none"></canvas>
  </div>

<script>
(function () {
  // ── Read URL params ────────────────────────────────────────────────────────
  const params    = new URLSearchParams(window.location.search);
  const s3Key     = params.get("key")   || "";
  const caseTitle = params.get("title") || "Judgment";
  const courtName = params.get("court") || "";

  document.title = `${caseTitle} — LexSearch`;
  document.getElementById("case-title").textContent =
    courtName ? `${courtName} · ${caseTitle}` : caseTitle;

  const isSC       = params.get("sc") === "1";
  const yearParam  = params.get("year") || "";
  let pdfUrl, downloadHref;
  if (isSC) {
    const pdfName = decodeURIComponent(s3Key.split("/").pop());
    pdfUrl = `/sc-pdf/${yearParam}/${pdfName}`;
    downloadHref = `/sc-pdf/${yearParam}/${pdfName}?download=true`;
  } else {
    pdfUrl = `/pdf/${s3Key}`;
    downloadHref = `/pdf/${s3Key}?download=true`;
  }
  const downloadEl = document.getElementById("download-btn");
  downloadEl.href  = downloadHref;

  // ── PDF.js setup ──────────────────────────────────────────────────────────
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const canvas    = document.getElementById("pdf-canvas");
  const ctx       = canvas.getContext("2d");
  const loadingMsg = document.getElementById("loading-msg");

  let pdfDoc      = null;
  let currentPage = 1;
  let scale       = 1.4;

  const prevBtn   = document.getElementById("prev-page");
  const nextBtn   = document.getElementById("next-page");
  const pageInfo  = document.getElementById("page-info");
  const zoomInBtn = document.getElementById("zoom-in");
  const zoomOutBtn= document.getElementById("zoom-out");
  const zoomLabel = document.getElementById("zoom-label");

  async function renderPage(num) {
    const page  = await pdfDoc.getPage(num);
    const vp    = page.getViewport({ scale });
    canvas.width  = vp.width;
    canvas.height = vp.height;

    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    pageInfo.textContent = `${num} / ${pdfDoc.numPages}`;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;
  }

  function updateZoomLabel() {
    zoomLabel.textContent = Math.round(scale * 100 / 1.4 * 100) + "%";
  }

  // Load PDF
  if (!s3Key) {
    loadingMsg.innerHTML = "<div style='color:#ff8888'>Error: No PDF key provided.</div>";
  } else {
    pdfjsLib.getDocument(pdfUrl).promise
      .then(doc => {
        pdfDoc = doc;
        loadingMsg.style.display = "none";
        canvas.style.display     = "block";
        renderPage(1);
        updateZoomLabel();
      })
      .catch(err => {
        loadingMsg.innerHTML = `<div style='color:#ff8888'>Failed to load PDF: ${err.message}</div>`;
      });
  }

  // ── Controls ───────────────────────────────────────────────────────────────
  prevBtn.addEventListener("click", () => {
    if (currentPage > 1) { currentPage--; renderPage(currentPage); }
  });

  nextBtn.addEventListener("click", () => {
    if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); }
  });

  zoomInBtn.addEventListener("click", () => {
    scale = Math.min(scale + 0.2, 4.0);
    renderPage(currentPage);
    updateZoomLabel();
  });

  zoomOutBtn.addEventListener("click", () => {
    scale = Math.max(scale - 0.2, 0.4);
    renderPage(currentPage);
    updateZoomLabel();
  });

  // Keyboard navigation
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight" || e.key === "ArrowDown") nextBtn.click();
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prevBtn.click();
    if (e.key === "+" || e.key === "=") zoomInBtn.click();
    if (e.key === "-")                  zoomOutBtn.click();
  });

  // ── AI Panel ──────────────────────────────────────────────────────────────
  const aiBtn = document.getElementById("ai-summarize-btn");
  const aiPanel = document.getElementById("ai-panel");
  const aiContent = document.getElementById("ai-panel-content");
  const aiClose = document.getElementById("ai-panel-close");
  let aiLoaded = false;

  function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function getReqBody() {
    if (isSC) {
      return { sc: true, year: parseInt(yearParam), pdf_name: decodeURIComponent(s3Key.split("/").pop()) };
    }
    return { s3_key: s3Key };
  }

  aiBtn.addEventListener("click", async () => {
    aiPanel.style.display = "";
    if (aiLoaded) return;

    aiContent.innerHTML = '<div class="summary-loading">Analyzing judgment with AI...</div>';

    try {
      const res = await fetch("/ai/summarize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(getReqBody()),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Summarization failed.");
      }
      const data = await res.json();
      renderViewerSummary(data);
      aiLoaded = true;
    } catch (e) {
      aiContent.innerHTML = `<div class="summary-error">${esc(e.message)}</div>`;
    }
  });

  aiClose.addEventListener("click", () => { aiPanel.style.display = "none"; });

  function renderViewerSummary(data) {
    if (data.raw_summary) {
      aiContent.innerHTML = `<p>${esc(data.raw_summary)}</p>`;
      return;
    }
    let html = '';
    if (data.facts) html += `<div class="summary-section"><h4>Facts</h4><p>${esc(data.facts)}</p></div>`;
    if (data.issues && data.issues.length) html += `<div class="summary-section"><h4>Issues</h4><ul>${data.issues.map(i => `<li>${esc(i)}</li>`).join("")}</ul></div>`;
    if (data.arguments) html += `<div class="summary-section"><h4>Arguments</h4><p>${esc(data.arguments)}</p></div>`;
    if (data.held) html += `<div class="summary-section"><h4>Held</h4><p>${esc(data.held)}</p></div>`;
    if (data.ratio) html += `<div class="summary-section"><h4>Ratio Decidendi</h4><p>${esc(data.ratio)}</p></div>`;
    if (data.statutes && data.statutes.length) html += `<div class="summary-section"><h4>Statutes Cited</h4><div class="summary-tags">${data.statutes.map(s => `<span class="tag">${esc(s)}</span>`).join("")}</div></div>`;
    if (data.result) html += `<div class="summary-section"><h4>Result</h4><span class="tag disposal">${esc(data.result)}</span></div>`;
    aiContent.innerHTML = html;
  }

  // Q&A in viewer
  const vqaBtn = document.getElementById("viewer-qa-btn");
  const vqaInput = document.getElementById("viewer-qa-input");
  const vqaAnswer = document.getElementById("viewer-qa-answer");

  async function viewerAsk() {
    const q = vqaInput.value.trim();
    if (!q) return;
    vqaBtn.disabled = true;
    vqaBtn.textContent = "Thinking...";
    vqaAnswer.style.display = "block";
    vqaAnswer.innerHTML = "<em>Analyzing...</em>";

    try {
      const res = await fetch("/ai/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...getReqBody(), question: q }),
      });
      if (!res.ok) throw new Error("Failed.");
      const data = await res.json();
      vqaAnswer.innerHTML = `<p>${esc(data.answer)}</p>`;
    } catch (e) {
      vqaAnswer.innerHTML = `<p class="summary-error">${esc(e.message)}</p>`;
    }
    vqaBtn.disabled = false;
    vqaBtn.textContent = "Ask";
  }

  vqaBtn.addEventListener("click", viewerAsk);
  vqaInput.addEventListener("keydown", e => { if (e.key === "Enter") viewerAsk(); });

})();
</script>
</body>
</html>
