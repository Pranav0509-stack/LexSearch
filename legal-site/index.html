<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexSearch — Indian High Court Judgments</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
</head>
<body>

<!-- Header -->
<header class="site-header">
  <a href="/" class="logo">
    <span class="logo-icon">⚖️</span>
    <div>
      <div class="logo-text">LexSearch</div>
    </div>
  </a>
  <span class="header-sub">Indian High Court Judgments</span>
</header>

<!-- Main Layout -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Filters</h2>

    <div class="filter-group">
      <label for="court-select">High Court</label>
      <select id="court-select">
        <option value="">All Courts</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="bench-select">Bench</label>
      <select id="bench-select" disabled>
        <option value="">All Benches</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Year</label>
      <input type="number" id="year-input" placeholder="e.g. 2023" min="1950" max="2025" />
    </div>

    <div class="filter-group">
      <label for="keyword-input">Case Title / Party Name</label>
      <input type="text" id="keyword-input" placeholder="e.g. Sharma vs State" autocomplete="off" />
    </div>

    <div class="filter-group">
      <label for="cnr-input">CNR Number</label>
      <input type="text" id="cnr-input" placeholder="e.g. DLHC010015762022" autocomplete="off" />
    </div>

    <div class="filter-group">
      <label for="judge-input">Judge Name</label>
      <input type="text" id="judge-input" placeholder="e.g. Justice Kumar" autocomplete="off" />
    </div>

    <div class="filter-group">
      <label for="case-type-input">Case Type</label>
      <select id="case-type-input">
        <option value="">All Types</option>
        <option value="CWP">Civil Writ Petition (CWP)</option>
        <option value="CRL">Criminal (CRL)</option>
        <option value="CRL.M.C">Criminal Misc (CRL.M.C)</option>
        <option value="BAIL">Bail Application</option>
        <option value="FAO">First Appeal (FAO)</option>
        <option value="RFA">Regular First Appeal (RFA)</option>
        <option value="RSA">Regular Second Appeal (RSA)</option>
        <option value="LPA">Letters Patent Appeal (LPA)</option>
        <option value="ITA">Income Tax Appeal (ITA)</option>
        <option value="CS">Civil Suit (CS)</option>
        <option value="WP">Writ Petition (WP)</option>
        <option value="OMP">Original Motion Petition (OMP)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="disposal-input">Disposal</label>
      <select id="disposal-input">
        <option value="">Any</option>
        <option value="Disposed Off">Disposed Off</option>
        <option value="Allowed">Allowed</option>
        <option value="Dismissed">Dismissed</option>
        <option value="Partly Allowed">Partly Allowed</option>
      </select>
    </div>

    <button class="search-btn" id="search-btn">Search</button>
    <button class="clear-btn" id="clear-btn">Clear</button>

    <div class="sidebar-footer">
      Made for Shreya Didi
    </div>
  </aside>

  <!-- Results -->
  <main class="main-content">

    <div id="error-container"></div>

    <div id="stats-bar" class="stats-bar" style="display:none">
      <span id="stats-text"></span>
      <span id="stats-time"></span>
    </div>

    <!-- Welcome -->
    <div id="welcome-screen" class="state-screen">
      <div class="icon">⚖️</div>
      <h3>Search Indian High Court Judgments</h3>
      <p>Select a court and year, or search by case title, CNR, or judge name.</p>
    </div>

    <!-- Loading -->
    <div id="loading-screen" class="state-screen" style="display:none">
      <div class="spinner"></div>
      <p>Searching...</p>
    </div>

    <!-- Empty -->
    <div id="empty-screen" class="state-screen" style="display:none">
      <div class="icon">🔍</div>
      <h3>No results</h3>
      <p>Try different filters or broaden your search.</p>
    </div>

    <!-- Results list -->
    <div id="results-grid" class="results-grid"></div>

    <!-- Pagination -->
    <div id="pagination" class="pagination" style="display:none"></div>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
