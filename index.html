<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexSearch — Indian Court Judgments</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    <span class="logo-icon">⚖️</span>
    <div class="logo-text">LexSearch</div>
  </a>
  <span class="header-made">Made for Shreya Didi</span>
</header>

<div class="app-layout">
  <aside class="sidebar">

    <!-- Court Type Toggle -->
    <div class="court-toggle">
      <button class="toggle-btn active" data-mode="hc">High Courts</button>
      <button class="toggle-btn" data-mode="sc">Supreme Court</button>
    </div>

    <h2>Filters</h2>

    <!-- HC-only filters -->
    <div id="hc-filters">
      <div class="filter-group">
        <label for="court-select">High Court</label>
        <select id="court-select">
          <option value="">All Courts</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="bench-select">Bench</label>
        <select id="bench-select" disabled>
          <option value="">All Benches</option>
        </select>
      </div>
    </div>

    <!-- SC-only filters -->
    <div id="sc-filters" style="display:none">
      <div class="filter-group">
        <label for="petitioner-input">Petitioner</label>
        <input type="text" id="petitioner-input" placeholder="e.g. Union of India" />
      </div>
      <div class="filter-group">
        <label for="respondent-input">Respondent</label>
        <input type="text" id="respondent-input" placeholder="e.g. State of Maharashtra" />
      </div>
      <div class="filter-group">
        <label for="citation-input">Citation</label>
        <input type="text" id="citation-input" placeholder="e.g. 2023 INSC 1043" />
      </div>
    </div>

    <!-- Common filters -->
    <div class="filter-group">
      <label>Year</label>
      <input type="number" id="year-input" placeholder="e.g. 2023" min="1950" max="2025" />
    </div>
    <div class="filter-group">
      <label for="keyword-input">Case Title / Party</label>
      <input type="text" id="keyword-input" placeholder="e.g. Sharma vs State" autocomplete="off" />
    </div>
    <div class="filter-group">
      <label for="cnr-input">CNR / Case ID</label>
      <input type="text" id="cnr-input" placeholder="e.g. DLHC010015762022" autocomplete="off" />
    </div>
    <div class="filter-group">
      <label for="judge-input">Judge</label>
      <input type="text" id="judge-input" placeholder="e.g. Justice Kumar" autocomplete="off" />
    </div>
    <div class="filter-group">
      <label for="disposal-input">Disposal</label>
      <select id="disposal-input">
        <option value="">Any</option>
        <option value="Disposed Off">Disposed Off</option>
        <option value="Allowed">Allowed</option>
        <option value="Dismissed">Dismissed</option>
      </select>
    </div>

    <button class="search-btn" id="search-btn">Search</button>
    <button class="clear-btn" id="clear-btn">Clear</button>
  </aside>

  <main class="main-content">
    <div id="error-container"></div>
    <div id="stats-bar" class="stats-bar" style="display:none">
      <span id="stats-text"></span>
      <span id="stats-time"></span>
    </div>
    <div id="welcome-screen" class="state-screen">
      <div class="icon">⚖️</div>
      <h3>Search Indian Court Judgments</h3>
      <p>High Courts (16.7M+ cases) and Supreme Court (35K+ cases).</p>
    </div>
    <div id="loading-screen" class="state-screen" style="display:none">
      <div class="spinner"></div>
      <p>Searching...</p>
    </div>
    <div id="empty-screen" class="state-screen" style="display:none">
      <div class="icon">🔍</div>
      <h3>No results</h3>
      <p>Try different filters or broaden your search.</p>
    </div>
    <div id="results-grid" class="results-grid"></div>
    <div id="pagination" class="pagination" style="display:none"></div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
