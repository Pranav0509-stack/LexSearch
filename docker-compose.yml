services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nyayasathi
      POSTGRES_PASSWORD: nyayasathi
      POSTGRES_DB: nyayasathi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://nyayasathi:nyayasathi@postgres:5432/nyayasathi
      DATABASE_URL_SYNC: postgresql+psycopg2://nyayasathi:nyayasathi@postgres:5432/nyayasathi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENV: dev
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  celery-worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://nyayasathi:nyayasathi@postgres:5432/nyayasathi
      DATABASE_URL_SYNC: postgresql+psycopg2://nyayasathi:nyayasathi@postgres:5432/nyayasathi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
  redisdata:
